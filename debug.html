<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLT Debug</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #DCF2C2; }
.step { padding: 10px; margin: 6px 0; border-radius: 8px; background: white; font-size: 14px; }
.ok { border-left: 4px solid green; }
.err { border-left: 4px solid red; }
.wait { border-left: 4px solid orange; }
</style>
</head>
<body>
<h2>Boss Lady Tings — Debug</h2>
<div id="log"></div>
<script>
var SB_URL = 'https://ckamlcpgucshevharpxg.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrYW1sY3BndWNzaGV2aGFycHhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE0OTcsImV4cCI6MjA5MjQ1NzQ5N30.WTGAY6BURpfyBioyRlNFTIe_BiTAKa65k4IhWnM4Oi4';

function log(msg, type) {
  var d = document.createElement('div');
  d.className = 'step ' + (type||'ok');
  d.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  document.getElementById('log').appendChild(d);
}

log('Page loaded', 'ok');

try {
  log('Testing fetch API...', 'wait');
  fetch(SB_URL + '/rest/v1/expenses?limit=1', {
    method: 'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY
    }
  }).then(function(r) {
    log('Supabase responded: HTTP ' + r.status, 'ok');
    return r.json();
  }).then(function(data) {
    log('Data received: ' + JSON.stringify(data).slice(0, 80), 'ok');
  }).catch(function(e) {
    log('Fetch error: ' + e.message, 'err');
  });
} catch(e) {
  log('fetch() threw: ' + e.message, 'err');
}

setTimeout(function() { log('5 second timeout fired OK', 'ok'); }, 5000);

log('Script finished running', 'ok');
</script>
</body>
</html>
