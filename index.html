<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f5f4f0; --bg2: #eceae4; --card: #ffffff;
  --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b97;

}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 16px; }
body { display: flex; flex-direction: column; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
.safe-top { height: var(--safe-top); background: var(--bg); flex-shrink: 0; }
.header { padding: 8px 16px 10px; background: var(--bg); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
.header-title em { font-style: italic; color: var(--accent); font-weight: 400; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); display: inline-block; margin-left: 6px; vertical-align: middle; transition: background 0.3s; }
.sync-dot.synced { background: #4caf50; }
.sync-dot.syncing { background: #ff9800; }
.sync-dot.error { background: var(--red); }
.biz-tabs { display: flex; overflow-x: auto; padding: 0 12px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.biz-tabs::-webkit-scrollbar { display: none; }
.biz-tab { padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--text3); white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -1px; cursor: pointer; user-select: none; transition: color 0.15s; }

.content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 14px 14px calc(80px + var(--safe-bottom)); }

.nav-lbl { font-size: 10px; font-weight: 600; color: var(--text3); }
.nav-btn.active .nav-lbl { color: var(--accent); }
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.metric { background: var(--card); border-radius: var(--r); padding: 14px 12px; border: 1px solid var(--border); }
.metric-lbl { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.metric-val { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.metric-val.green { color: var(--accent); }

.card { background: var(--card); border-radius: var(--r); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }

.schc-row:last-child { border-bottom: none; font-weight: 700; }
.export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.period-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.period-pill { padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 600; border: 1.5px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; -webkit-appearance: none; font-family: -apple-system, 'Helvetica Neue', sans-serif; }
.period-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.period-select { padding: 8px 12px; border-radius: var(--r-sm); font-size: 14px; border: 1.5px solid var(--border2); background: #fff; color: var(--text); -webkit-appearance: none; font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 40px; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 300; display: flex; align-items: flex-end; }
.modal { background: var(--bg); border-radius: 20px 20px 0 0; padding: 20px 16px calc(20px + var(--safe-bottom)); width: 100%; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.modal-title { font-size: 17px; font-weight: 700; color: var(--text); }
.doc-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
.doc-row:last-child { border-bottom: none; }
.doc-icon { font-size: 24px; flex-shrink: 0; }
.doc-info { flex: 1; min-width: 0; }
.doc-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Loading screen */
#loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }

#loading .load-title em { font-style: italic; font-weight: 400; color: var(--text2); }
#loading .load-sub { font-size: 13px; color: var(--text3); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#toast { position: fixed; bottom: calc(80px + var(--safe-bottom) + 12px); left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.25s; z-index: 400; pointer-events: none; white-space: nowrap; }
</style>

<script>
var SB_URL = 'https://ckamlcpgucshevharpxg.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrYW1sY3BndWNzaGV2aGFycHhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODE0OTcsImV4cCI6MjA5MjQ1NzQ5N30.WTGAY6BURpfyBioyRlNFTIe_BiTAKa65k4IhWnM4Oi4';

var CATS = {
  rover:  ['Supplies','Food & Bev','Transportation','Travel','Platform Fees','Marketing','Software','Other'],
  wyzant: ['Supplies','Transportation','Travel','Platform Fees','Marketing','Software','Other'],
  itt:    ['Decor','Food & Bev','Marketing','Utilities','Venue','Supplies','Transportation','Other'],
  eve:    ['Decor','Food & Bev','Marketing','Utilities','Venue','Supplies','Transportation','Software','Other']
};
var PAY = ['BoA CC','Apple Card','Venmo','PayPal','Personal Debit','Personal Checking','EventBrite Portal','Cash','Other'];
var SC_MAP = {
  'Supplies':'Supplies (ln 22)','Food & Bev':'Meals (ln 24b)','Travel':'Travel (ln 24a)',
  'Transportation':'Car & truck (ln 9)','Platform Fees':'Commissions (ln 10)',
  'Marketing':'Advertising (ln 8)','Software':'Office expense (ln 18)',
  'Utilities':'Utilities (ln 25)','Venue':'Rent/lease (ln 20b)',
  'Decor':'Supplies (ln 22)','Other':'Other expenses (ln 48)'
};
var BIZ = {rover:'Rover',wyzant:'Wyzant',itt:'It Takes Two',eve:'EVE'};
var TICKET_BIZ = ['itt','eve'];
var CAT_CLS = {
  'Decor':'b-decor','Food & Bev':'b-food','Marketing':'b-marketing','Utilities':'b-utilities',
  'Venue':'b-venue','Supplies':'b-supplies','Platform Fees':'b-platform','Travel':'b-travel',
  'Transportation':'b-transport','Software':'b-software','Other':'b-other'
};
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// In-memory state loaded from Supabase
var state = {
  rover:{expenses:[],income:{amount:0,date:'',asOf:''}},
  wyzant:{expenses:[],income:{amount:0,date:'',asOf:''}},
  itt:{expenses:[],events:[],ticketPrices:{single:65,couple:115}},
  eve:{expenses:[],events:[],ticketPrices:{single:65,couple:115}},
  docs:[]
};
var biz = 'rover', curView = 'overview';
var pendingFiles = [];
var periodMode = 'all', periodMonth = '', periodYear = '';
var editingId = null;

// ── SUPABASE HELPERS ──
function sbHeaders() {
  return {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  };
}

function sbGet(table, params) {
  var url = SB_URL + '/rest/v1/' + table + '?';
  if (params) url += params;
  return fetch(url, { method: 'GET', headers: sbHeaders() }).then(function(r) { return r.json(); });
}

function sbInsert(table, data) {
  return fetch(SB_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: sbHeaders(),
    body: JSON.stringify(data)
  });
}

function sbUpdate(table, id, data) {
  return fetch(SB_URL + '/rest/v1/' + table + '?id=eq.' + encodeURIComponent(id), {
    method: 'PATCH',
    headers: sbHeaders(),
    body: JSON.stringify(data)
  });
}

function sbDelete(table, id) {
  return fetch(SB_URL + '/rest/v1/' + table + '?id=eq.' + encodeURIComponent(id), {
    method: 'DELETE',
    headers: sbHeaders()
  });
}

function sbUpsert(table, data) {
  return fetch(SB_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: Object.assign({}, sbHeaders(), {'Prefer': 'resolution=merge-duplicates,return=minimal'}),
    body: JSON.stringify(data)
  });
}

function setSyncDot(status) {
  var dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot ' + status;
}

// ── LOAD ALL DATA FROM SUPABASE ──
function loadAll() {
  setSyncDot('syncing');
  var promises = [
    sbGet('expenses', 'order=date.desc'),
    sbGet('events', 'order=date.desc'),
    sbGet('ticket_prices', ''),
    sbGet('docs', 'order=uploaded.desc'),
    sbGet('income_records', '')
  ];
  return Promise.all(promises).then(function(results) {
    var expenses = results[0] || [];
    var events   = results[1] || [];
    var prices   = results[2] || [];
    var docs     = results[3] || [];
    var incomes  = results[4] || [];

    // Reset state
    var keys = ['rover','wyzant','itt','eve'];
    keys.forEach(function(k) {
      state[k].expenses = [];
      state[k].events = [];
    });
    state.docs = [];

    // Map expenses to businesses
    expenses.forEach(function(e) {
      if (state[e.biz]) {
        state[e.biz].expenses.push({
          id: e.id, date: e.date, time: e.time, vendor: e.vendor,
          amount: e.amount, category: e.category, payMethod: e.pay_method,
          note: e.note, files: e.files ? e.files.split('|').filter(Boolean) : []
        });
      }
    });

    // Map events
    events.forEach(function(e) {
      if (state[e.biz]) {
        state[e.biz].events.push({
          id: e.id, name: e.name, date: e.date,
          singleSold: e.single_sold, coupleSold: e.couple_sold, opCost: e.op_cost
        });
      }
    });

    // Map ticket prices
    prices.forEach(function(p) {
      if (state[p.biz]) {
        state[p.biz].ticketPrices = { single: p.single_price, couple: p.couple_price };
      }
    });

    // Map docs
    docs.forEach(function(d) {
      state.docs.push({ id: d.id, name: d.name, biz: d.biz, uploaded: d.uploaded });
    });

    // Map income records
    incomes.forEach(function(r) {
      if (state[r.biz]) {
        state[r.biz].income = { amount: r.amount||0, date: r.date||'', asOf: r.as_of||'' };
      }
    });

    setSyncDot('synced');
    return true;
  }).catch(function(err) {
    setSyncDot('error');
    console.error('Sync error:', err);
    return false;
  });
}

// ── UI HELPERS ──
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(function() { t.style.opacity = '0'; }, 2200);
}
function fmt(n) { return '$' + parseFloat(n||0).toFixed(2); }
function fmtDate(d) { if (!d) return ''; var p = d.split('-'); return p[1]+'/'+p[2]+'/'+p[0].slice(2); }
function catCls(c) { return CAT_CLS[c] || 'b-other'; }
function genId() { return Date.now() + '-' + Math.random().toString(36).slice(2,7); }
function fmtMonthLabel(ym) { var p = ym.split('-'); return MONTHS[parseInt(p[1])-1] + ' ' + p[0]; }

function filteredExps(b) {
  var all = state[b].expenses || [];
  if (periodMode === 'all') return all;
  return all.filter(function(e) {
    if (!e.date) return false;
    if (periodMode === 'year') return e.date.slice(0,4) === periodYear;
    if (periodMode === 'month') return e.date.slice(0,7) === periodMonth;
    return true;
  });
}
function totalExp(b) { return filteredExps(b).reduce(function(s,e){ return s+(parseFloat(e.amount)||0); },0); }
function totalRev(b) {
  if (TICKET_BIZ.indexOf(b)<0) return 0;
  var p = state[b].ticketPrices;
  var evs = filteredEvs(b);
  return evs.reduce(function(s,ev){ return s+(parseInt(ev.singleSold)||0)*parseFloat(p.single)+(parseInt(ev.coupleSold)||0)*parseFloat(p.couple); },0);
}
function filteredEvs(b) {
  var evs = state[b].events || [];
  if (periodMode === 'all') return evs;
  return evs.filter(function(ev) {
    if (!ev.date) return false;
    if (periodMode === 'year') return ev.date.slice(0,4) === periodYear;
    if (periodMode === 'month') return ev.date.slice(0,7) === periodMonth;
    return true;
  });
}
function totalAtt(b) { return filteredEvs(b).reduce(function(s,ev){ return s+(parseInt(ev.singleSold)||0)+(parseInt(ev.coupleSold)||0)*2; },0); }

function getAvailableYears(b) {
  var years = {};
  (state[b].expenses||[]).forEach(function(e){ if(e.date) years[e.date.slice(0,4)]=1; });
  (state[b].events||[]).forEach(function(e){ if(e.date) years[e.date.slice(0,4)]=1; });
  return Object.keys(years).sort().reverse();
}
function getAvailableMonths(b) {
  var months = {};
  (state[b].expenses||[]).forEach(function(e){ if(e.date) months[e.date.slice(0,7)]=1; });
  (state[b].events||[]).forEach(function(e){ if(e.date) months[e.date.slice(0,7)]=1; });
  return Object.keys(months).sort().reverse();
}

function switchBiz(b2) {
  biz = b2; periodMode='all'; periodMonth=''; periodYear='';
  var tabs = document.querySelectorAll('.biz-tab');
  var keys = ['rover','wyzant','itt','eve'];
  for (var i=0;i<tabs.length;i++) tabs[i].classList.toggle('active',keys[i]===b2);
  render();
}
function switchView(v) {
  curView = v;
  ['overview','add','docs','earnings','export'].forEach(function(x){
    var el = document.getElementById('nav-'+x);
    if(el) el.classList.toggle('active',x===v);
  });
  // Refresh data when switching to overview or earnings
  if (v === 'overview' || v === 'earnings') {
    setSyncDot('syncing');
    loadAll().then(function(){ render(); });
  } else {
    render();
  }
}

function render() {
  var el = document.getElementById('content');
  if (!el) return;
  if (curView==='overview') el.innerHTML = buildOverview();
  else if (curView==='add') el.innerHTML = buildAdd();
  else if (curView==='docs') el.innerHTML = buildDocs();
  else if (curView==='earnings') el.innerHTML = buildEarnings();
  else el.innerHTML = buildExport();
  if (curView==='add') initAddDefaults();
  if (curView==='export') renderSchedC();
  el.scrollTop = 0;
}

function buildPeriodBar() {
  var years = getAvailableYears(biz);
  var months = getAvailableMonths(biz);
  var h = '<div class="period-bar">';
  h += '<button class="period-pill'+(periodMode==='all'?' active':'')+'" onclick="setPeriod(\'all\')">All time</button>';
  if (years.length) {
    h += '<select class="period-select" onchange="setPeriodYear(this.value)" style="max-width:100px"><option value="">Year...</option>';
    years.forEach(function(y){ h+='<option value="'+y+'"'+(periodMode==='year'&&periodYear===y?' selected':'')+'>'+y+'</option>'; });
    h += '</select>';
  }
  if (months.length) {
    h += '<select class="period-select" onchange="setPeriodMonth(this.value)" style="max-width:120px"><option value="">Month...</option>';
    months.forEach(function(m){ h+='<option value="'+m+'"'+(periodMode==='month'&&periodMonth===m?' selected':'')+'>'+fmtMonthLabel(m)+'</option>'; });
    h += '</select>';
  }
  h += '</div>';
  if (periodMode!=='all') {
    var label = periodMode==='year'?periodYear:fmtMonthLabel(periodMonth);
    h += '<div style="font-size:12px;color:var(--accent);font-weight:600;margin-bottom:10px">Showing: '+label+'</div>';
  }
  return h;
}
function setPeriod(m){ periodMode=m; periodMonth=''; periodYear=''; render(); }
function setPeriodYear(v){ if(!v){periodMode='all';periodYear='';render();return;} periodMode='year';periodYear=v;periodMonth='';render(); }
function setPeriodMonth(v){ if(!v){periodMode='all';periodMonth='';render();return;} periodMode='month';periodMonth=v;periodYear='';render(); }

function buildOverview() {
  var exps = filteredExps(biz);
  var isT = TICKET_BIZ.indexOf(biz)>=0;
  var te=totalExp(biz), tr=totalRev(biz), profit=tr-te;
  var cats=CATS[biz], ct={};
  cats.forEach(function(c){ct[c]=0;});
  exps.forEach(function(e){ ct[e.category]!==undefined?ct[e.category]+=parseFloat(e.amount)||0:ct['Other']=(ct['Other']||0)+(parseFloat(e.amount)||0); });

  var h = buildPeriodBar();
  h += '<div class="metrics">';
  h += '<div class="metric"><div class="metric-lbl">Expenses</div><div class="metric-val red">'+fmt(te)+'</div></div>';
  if (isT) {
    h += '<div class="metric"><div class="metric-lbl">Revenue</div><div class="metric-val green">'+fmt(tr)+'</div></div>';
    h += '<div class="metric"><div class="metric-lbl">Net profit</div><div class="metric-val '+(profit>=0?'green':'red')+'">'+fmt(profit)+'</div></div>';
    h += '<div class="metric"><div class="metric-lbl">Attendance</div><div class="metric-val">'+totalAtt(biz)+'</div></div>';
  } else {
    var inc = state[biz].income || {amount:0,date:'',asOf:''};
    var incProfit = (parseFloat(inc.amount)||0) - te;
    h += '<div class="metric"><div class="metric-lbl">Logged</div><div class="metric-val">'+exps.length+'</div></div>';
    h += '<div class="metric" style="grid-column:1/-1"><div class="metric-lbl">Income YTD</div><div class="metric-val green">'+fmt(inc.amount)+'</div>'+(inc.asOf?'<div style="font-size:10px;color:var(--text3);margin-top:3px">As of '+fmtDate(inc.asOf)+'</div>':'')+'</div>';
    h += '<div class="metric" style="grid-column:1/-1"><div class="metric-lbl">Net profit YTD</div><div class="metric-val '+(incProfit>=0?'green':'red')+'">'+fmt(incProfit)+'</div></div>';
  }
  h += '</div>';

  // Income input for non-ticket businesses (Rover, Wyzant)
  if (!isT) {
    var inc2 = state[biz].income || {amount:0,date:'',asOf:''};
    h += '<div class="sec-label">Update income</div><div class="card"><div class="card-body" style="padding-top:12px">';
    h += '<p style="font-size:12px;color:var(--text2);margin-bottom:10px">Log your total income earned year to date from '+BIZ[biz]+'. Update this whenever you check your earnings.</p>';
    h += '<div class="form-row">';
    h += '<div class="fg" style="flex:2"><label>Income YTD ($)</label><input type="number" id="inc-amount" value="'+(inc2.amount||'')+'" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div>';
    h += '<div class="fg"><label>As of date</label><input type="date" id="inc-date" value="'+(inc2.asOf||'')+'"></div>';
    h += '</div>';
    h += '<button class="btn-full" onclick="saveIncome()">Update Income</button>';
    h += '</div></div>';
  }

  var hasCats = cats.some(function(c){return ct[c]>0;});
  if (hasCats) {
    h += '<div class="sec-label">By category</div><div class="card">';
    cats.filter(function(c){return ct[c]>0;}).sort(function(a,b){return ct[b]-ct[a];}).forEach(function(c){
      h += '<div class="cat-row"><span class="badge '+catCls(c)+'">'+c+'</span><span class="cat-amt">'+fmt(ct[c])+'</span></div>';
    });
    h += '</div>';
  }

  if (isT) {
    var evs = filteredEvs(biz).slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
    var tp = state[biz].ticketPrices;
    h += '<div class="sec-label">Events</div><div class="card">';
    if (!evs.length) h += '<div class="empty">No events for this period.</div>';
    else {
      evs.forEach(function(ev){
        var rev=(parseInt(ev.singleSold)||0)*parseFloat(tp.single)+(parseInt(ev.coupleSold)||0)*parseFloat(tp.couple);
        var att=(parseInt(ev.singleSold)||0)+(parseInt(ev.coupleSold)||0)*2;
        var net=rev-(parseFloat(ev.opCost)||0);
        h+='<div class="ev-item"><div style="display:flex;justify-content:space-between;align-items:flex-start">';
        h+='<div><div class="ev-name">'+(ev.name||'Unnamed')+'</div><div class="ev-date">'+fmtDate(ev.date)+'</div></div>';
        h+='<span style="font-size:16px;font-weight:700;color:'+(net>=0?'var(--accent)':'var(--red)')+'">'+fmt(net)+'</span></div>';
        h+='<div class="ev-stats"><div class="ev-stat">🎟 <strong>'+att+'</strong> attended</div><div class="ev-stat">💰 <strong>'+fmt(rev)+'</strong></div>';
        h+='<div class="ev-stat">Singles: <strong>'+(ev.singleSold||0)+'</strong></div><div class="ev-stat">Couples: <strong>'+(ev.coupleSold||0)+'</strong></div></div>';
        h+='<div style="margin-top:8px"><button class="btn-del" onclick="deleteEvent(\''+ev.id+'\')">Delete</button></div></div>';
      });
      h+='<div class="total-row"><span>Period revenue</span><span style="color:var(--accent)">'+fmt(tr)+'</span></div>';
    }
    h += '</div>';
  }

  var sorted = exps.slice().sort(function(a,b){return new Date(b.date+' '+(b.time||'00:00'))-new Date(a.date+' '+(a.time||'00:00'));});
  h += '<div class="sec-label">Expense log ('+sorted.length+')</div><div class="card">';
  if (!sorted.length) h += '<div class="empty">No expenses for this period.</div>';
  else sorted.forEach(function(e){
    h+='<div class="exp-row"><div class="exp-main"><div class="exp-vendor">'+(e.vendor||'—')+'</div>';
    h+='<div class="exp-meta">'+fmtDate(e.date)+(e.time?' · '+e.time:'')+(e.payMethod?' · '+e.payMethod:'')+'</div>';
    if(e.note) h+='<div class="exp-note">'+e.note+'</div>';
    if(e.files&&e.files.length) h+='<div style="font-size:11px;color:var(--text3);margin-top:3px">📎 '+e.files.join(', ')+'</div>';
    h+='<span class="badge '+catCls(e.category)+'">'+e.category+'</span></div>';
    h+='<div class="exp-right"><div class="exp-amt">'+fmt(e.amount)+'</div>';
    h+='<div class="exp-actions">';
    h+='<button class="btn-edit" onclick="openEdit(\''+e.id+'\')">Edit</button>';
    h+='<button class="btn-dupe" onclick="dupeExp(\''+e.id+'\')">Dupe</button>';
    h+='<button class="btn-del" onclick="deleteExp(\''+e.id+'\')">Del</button>';
    h+='</div></div></div>';
  });
  h += '</div>';
  return h;
}

function buildEarnings() {
  var keys = ['rover','wyzant','itt','eve'];
  var totalIncome = 0, totalExpAll = 0, totalProfitAll = 0;
  var h = '<div class="sec-label">Total Earnings — All Businesses</div>';

  // Per-business cards
  keys.forEach(function(k) {
    var isT = TICKET_BIZ.indexOf(k) >= 0;
    var exp = (state[k].expenses||[]).reduce(function(s,e){return s+(parseFloat(e.amount)||0);},0);
    var inc, profit;
    if (isT) {
      var p = state[k].ticketPrices;
      inc = (state[k].events||[]).reduce(function(s,ev){return s+(parseInt(ev.singleSold)||0)*parseFloat(p.single)+(parseInt(ev.coupleSold)||0)*parseFloat(p.couple);},0);
    } else {
      inc = parseFloat((state[k].income||{}).amount)||0;
    }
    profit = inc - exp;
    totalIncome += inc;

    totalProfitAll += profit;

    var emoji = {rover:'🐾',wyzant:'📚',itt:'💃',eve:'🌿'}[k];

    h += '<div style="padding:12px 10px;border-right:1px solid var(--border)"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Expenses</div><div style="font-size:16px;font-weight:700;color:var(--red)">'+fmt(exp)+'</div></div>';
    h += '<div style="padding:12px 10px"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Net profit</div><div style="font-size:16px;font-weight:700;color:'+(profit>=0?'var(--accent)':'var(--red)')+'">'+fmt(profit)+'</div></div>';

  // Grand total card

  h += '<div style="font-size:32px;font-weight:700;color:#fff">'+fmt(totalIncome)+'</div>';
  h += '</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--border)">';
  h += '<div style="padding:14px;border-right:1px solid var(--border)"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Total expenses</div><div style="font-size:22px;font-weight:700;color:var(--red)">'+fmt(totalExpAll)+'</div></div>';
  h += '<div style="padding:14px"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Total net profit</div><div style="font-size:22px;font-weight:700;color:'+(totalProfitAll>=0?'var(--accent)':'var(--red)')+'">'+fmt(totalProfitAll)+'</div></div>';
  h += '</div>';

  h += '<p style="font-size:12px;color:var(--text2)">⚠️ This is an estimate of taxable income. Net profit is your approximate gross income for Schedule C. Consult a tax professional for your actual tax liability.</p>';

  h+='<div id="ed-existing-chips" style="margin-bottom:6px">';
  editExistingFiles.forEach(function(f){
    h+='<span class="file-chip">📎 '+f+' <span onclick="removeEditExisting(\''+f+'\')" style="cursor:pointer;color:var(--red)">×</span></span>';
  });
  h+='</div>';
  // Upload zone for new files
  h+='<div class="upload-zone" onclick="document.getElementById(\'ed-file\').click()">📎 Tap to add new receipt or file<input type="file" id="ed-file" style="display:none" accept="image/*,.pdf" multiple onchange="handleEditFiles(this)"></div>';
  h+='<div id="ed-new-chips"></div>';
  h+='</div>';
  h+='<button class="btn-full" onclick="saveEdit()">Save Changes</button>';
  h+='<button class="btn-full" style="background:var(--bg2);color:var(--text2);margin-top:8px" onclick="closeModalDirect()">Cancel</button>';
  h+='</div></div>';
  document.getElementById('modal-root').innerHTML=h;
}

function handleEditFiles(input) {
  var names=Array.prototype.map.call(input.files,function(f){return f.name;});
  editPendingFiles=editPendingFiles.concat(names).filter(function(v,i,a){return a.indexOf(v)===i;});
  var chips=document.getElementById('ed-new-chips');
  if(chips) chips.innerHTML=editPendingFiles.map(function(f){return'<span class="file-chip" style="background:var(--accent-light)">📎 '+f+' <span onclick="removeEditNew(\''+f+'\')" style="cursor:pointer;color:var(--red)">×</span></span>';}).join('');
}

function removeEditExisting(fname) {
  editExistingFiles=editExistingFiles.filter(function(f){return f!==fname;});
  var chips=document.getElementById('ed-existing-chips');
  if(chips) chips.innerHTML=editExistingFiles.map(function(f){return'<span class="file-chip">📎 '+f+' <span onclick="removeEditExisting(\''+f+'\')" style="cursor:pointer;color:var(--red)">×</span></span>';}).join('');
}

function removeEditNew(fname) {
  editPendingFiles=editPendingFiles.filter(function(f){return f!==fname;});
  var chips=document.getElementById('ed-new-chips');
  if(chips) chips.innerHTML=editPendingFiles.map(function(f){return'<span class="file-chip" style="background:var(--accent-light)">📎 '+f+' <span onclick="removeEditNew(\''+f+'\')" style="cursor:pointer;color:var(--red)">×</span></span>';}).join('');
}

function closeModal(evt){if(evt.target.classList.contains('modal-overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-root').innerHTML='';editingId=null;editPendingFiles=[];editExistingFiles=[];}

function saveEdit() {
  // Merge kept existing files + newly added files
  var allFiles = editExistingFiles.concat(editPendingFiles);
  var data = {
    date: document.getElementById('ed-date').value,
    time: document.getElementById('ed-time').value,
    vendor: (document.getElementById('ed-vendor').value||'').trim(),
    amount: parseFloat(document.getElementById('ed-amount').value)||0,
    category: document.getElementById('ed-cat').value,
    pay_method: document.getElementById('ed-pay').value,
    note: (document.getElementById('ed-note').value||'').trim(),
    files: allFiles.join('|')
  };
  setSyncDot('syncing');
  sbUpdate('expenses', editingId, data).then(function(){
    return loadAll();
  }).then(function(){
    closeModalDirect(); toast('✓ Expense updated'); render();
  }).catch(function(){ setSyncDot('error'); toast('Save failed — check connection'); });
}

// ── DUPLICATE ──
function dupeExp(id) {
  var exps=state[biz].expenses, orig=null;
  for(var i=0;i<exps.length;i++){if(exps[i].id===id){orig=exps[i];break;}}
  if(!orig) return;
  var today = new Date().toISOString().split('T')[0];
  var row = {
    id: genId(), biz: biz,
    date: today, time: orig.time,
    vendor: orig.vendor, amount: orig.amount,
    category: orig.category, pay_method: orig.payMethod,
    note: (orig.note?orig.note+' (copy)':'(copy)'),
    files: (orig.files||[]).join('|')
  };
  setSyncDot('syncing');
  sbInsert('expenses', row).then(function(){ return loadAll(); }).then(function(){
    toast('✓ Duplicated — update the date if needed'); render();
  }).catch(function(){ setSyncDot('error'); toast('Duplicate failed'); });
}

// ── ADD EXPENSE ──
function initAddDefaults() {
  var today=new Date().toISOString().split('T')[0];
  var now=new Date();
  var t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  var d=document.getElementById('a-date'); if(d) d.value=today;
  var ti=document.getElementById('a-time'); if(ti) ti.value=t;
  var ed=document.getElementById('ev-date'); if(ed) ed.value=today;
  pendingFiles=[];
  var chips=document.getElementById('file-chips'); if(chips) chips.innerHTML='';
  var ss=document.getElementById('ev-ss'); if(ss) ss.addEventListener('input',updatePreview);
  var cs=document.getElementById('ev-cs'); if(cs) cs.addEventListener('input',updatePreview);
  var oc=document.getElementById('ev-oc'); if(oc) oc.addEventListener('input',updatePreview);
}

function updatePreview() {
  var sp=parseFloat((document.getElementById('ev-sp')||{}).value)||0;
  var cp=parseFloat((document.getElementById('ev-cp')||{}).value)||0;
  var ss=parseInt((document.getElementById('ev-ss')||{}).value)||0;
  var cs=parseInt((document.getElementById('ev-cs')||{}).value)||0;
  var oc=parseFloat((document.getElementById('ev-oc')||{}).value)||0;
  var rev=ss*sp+cs*cp, att=ss+cs*2;
  var prev=document.getElementById('ev-preview'); if(!prev) return;
  if(!ss&&!cs){prev.innerHTML='';return;}
  prev.innerHTML='<div class="preview"><div class="preview-row"><span style="color:var(--text3)">Attendance</span><strong>'+att+' people</strong></div>'
    +'<div class="preview-row"><span style="color:var(--text3)">Revenue</span><strong style="color:var(--accent)">'+fmt(rev)+'</strong></div>'
    +'<div class="preview-row"><span style="color:var(--text3)">Net after op costs</span><strong style="color:'+(rev-oc>=0?'var(--accent)':'var(--red)')+'">'+fmt(rev-oc)+'</strong></div></div>';
}

function handleFiles(input) {
  var names=Array.prototype.map.call(input.files,function(f){return f.name;});
  pendingFiles=pendingFiles.concat(names).filter(function(v,i,a){return a.indexOf(v)===i;});
  var chips=document.getElementById('file-chips');
  if(chips) chips.innerHTML=pendingFiles.map(function(f){return'<span class="file-chip">📎 '+f+' <span onclick="removeFile(\''+f+'\')" style="cursor:pointer;color:var(--red)">×</span></span>';}).join('');
}
function removeFile(n){
  pendingFiles=pendingFiles.filter(function(f){return f!==n;});
  var chips=document.getElementById('file-chips');
  if(chips) chips.innerHTML=pendingFiles.map(function(f){return'<span class="file-chip">📎 '+f+' <span onclick="removeFile(\''+f+'\')" style="cursor:pointer;color:var(--red)">×</span></span>';}).join('');
}

function addExp() {
  var vendor=(document.getElementById('a-vendor').value||'').trim();
  var amount=parseFloat(document.getElementById('a-amount').value);
  var date=document.getElementById('a-date').value;
  var time=document.getElementById('a-time').value;
  var cat=document.getElementById('a-cat').value;
  var pay=document.getElementById('a-pay').value;
  var note=(document.getElementById('a-note').value||'').trim();
  if(!vendor||isNaN(amount)||amount<=0){toast('Enter vendor and amount');return;}
  if(!date){toast('Select a date');return;}
  var row={id:genId(),biz:biz,date:date,time:time,vendor:vendor,amount:amount,category:cat,pay_method:pay,note:note,files:pendingFiles.join('|')};
  setSyncDot('syncing');
  sbInsert('expenses',row).then(function(){return loadAll();}).then(function(){
    toast('✓ Expense added'); pendingFiles=[];
    document.getElementById('a-vendor').value='';
    document.getElementById('a-amount').value='';
    document.getElementById('a-note').value='';
    var chips=document.getElementById('file-chips'); if(chips) chips.innerHTML='';
  }).catch(function(){setSyncDot('error');toast('Save failed — check connection');});
}

function addEvent() {
  var name=(document.getElementById('ev-name').value||'').trim();
  var date=document.getElementById('ev-date').value;
  var sp=parseFloat(document.getElementById('ev-sp').value)||0;
  var cp=parseFloat(document.getElementById('ev-cp').value)||0;
  var ss=parseInt(document.getElementById('ev-ss').value)||0;
  var cs=parseInt(document.getElementById('ev-cs').value)||0;
  var oc=parseFloat(document.getElementById('ev-oc').value)||0;
  if(!date){toast('Enter event date');return;}
  if(!ss&&!cs){toast('Enter tickets sold');return;}
  setSyncDot('syncing');
  var priceRow={biz:biz,single_price:sp,couple_price:cp};
  var evRow={id:genId(),biz:biz,name:name,date:date,single_sold:ss,couple_sold:cs,op_cost:oc};
  Promise.all([sbUpsert('ticket_prices',priceRow), sbInsert('events',evRow)]).then(function(){return loadAll();}).then(function(){
    toast('✓ Event logged');
    document.getElementById('ev-name').value='';
    document.getElementById('ev-ss').value='';
    document.getElementById('ev-cs').value='';
    document.getElementById('ev-oc').value='';
    var prev=document.getElementById('ev-preview'); if(prev) prev.innerHTML='';
  }).catch(function(){setSyncDot('error');toast('Save failed — check connection');});
}

function deleteExp(id) {
  if(!confirm('Delete this expense?')) return;
  setSyncDot('syncing');
  sbDelete('expenses',id).then(function(){return loadAll();}).then(function(){toast('Deleted');render();}).catch(function(){setSyncDot('error');});
}
function deleteEvent(id) {
  if(!confirm('Delete this event?')) return;
  setSyncDot('syncing');
  sbDelete('events',id).then(function(){return loadAll();}).then(function(){toast('Deleted');render();}).catch(function(){setSyncDot('error');});
}

// ── DOCS ──
function uploadDocs(input) {
  var files=Array.prototype.slice.call(input.files);
  var today=new Date().toLocaleDateString();
  var rows=files.map(function(f){return{id:genId(),name:f.name,biz:BIZ[biz],uploaded:today};});
  setSyncDot('syncing');
  sbInsert('docs',rows).then(function(){return loadAll();}).then(function(){
    toast('✓ '+files.length+' form(s) uploaded');render();
  }).catch(function(){setSyncDot('error');toast('Upload failed');});
}
function deleteDoc(id) {
  if(!confirm('Remove this document?')) return;
  setSyncDot('syncing');
  sbDelete('docs',id).then(function(){return loadAll();}).then(function(){toast('Removed');render();}).catch(function(){setSyncDot('error');});
}

// ── EXPORT ──
function renderSchedC() {
  var b=(document.getElementById('sc-biz')||{}).value||'rover';
  var exps=state[b].expenses||[], map={};
  exps.forEach(function(e){var l=SC_MAP[e.category]||'Other expenses (ln 48)';map[l]=(map[l]||0)+(parseFloat(e.amount)||0);});
  var out=document.getElementById('sc-out'); if(!out) return;
  if(!Object.keys(map).length){out.innerHTML='<p style="font-size:13px;color:var(--text3);padding:8px 0">No expenses yet.</p>';return;}
  var total=0,h='<div class="card" style="margin:0">';
  Object.keys(map).sort(function(a,b){return map[b]-map[a];}).forEach(function(k){total+=map[k];h+='<div class="schc-row"><span style="color:var(--text2)">'+k+'</span><strong>'+fmt(map[k])+'</strong></div>';});
  h+='<div class="schc-row" style="background:var(--bg2)"><span>Total deductible</span><strong style="color:var(--red)">'+fmt(total)+'</strong></div></div>';
  out.innerHTML=h;
}

function exportCSV(b) {
  var rows=[['Business','Date','Time','Vendor','Amount','Category','Payment Method','Note','Receipts']];
  var keys=b==='all'?['rover','wyzant','itt','eve']:[b];
  keys.forEach(function(k){
    (state[k].expenses||[]).forEach(function(e){rows.push([BIZ[k],e.date,e.time,e.vendor,e.amount,e.category,e.payMethod,e.note,(e.files||[]).join('; ')]);});
    if(TICKET_BIZ.indexOf(k)>=0&&(state[k].events||[]).length){
      rows.push([]);
      rows.push([BIZ[k]+' Events','Date','Name','Singles','Couples','Attendance','Op Costs','Revenue']);
      var tp=state[k].ticketPrices;
      state[k].events.slice().sort(function(a,c){return new Date(a.date)-new Date(c.date);}).forEach(function(ev){
        var rev=(parseInt(ev.singleSold)||0)*parseFloat(tp.single)+(parseInt(ev.coupleSold)||0)*parseFloat(tp.couple);
        rows.push([BIZ[k],ev.date,ev.name,ev.singleSold,ev.coupleSold,(parseInt(ev.singleSold)||0)+(parseInt(ev.coupleSold)||0)*2,ev.opCost,rev.toFixed(2)]);
      });
    }
  });
  dl(rows,(b==='all'?'all_businesses':BIZ[b])+'_expenses.csv');
}

function exportSchC() {
  var b=(document.getElementById('sc-biz')||{}).value||'rover';
  var exps=state[b].expenses||[], map={};
  exps.forEach(function(e){var l=SC_MAP[e.category]||'Other expenses (ln 48)';map[l]=(map[l]||0)+(parseFloat(e.amount)||0);});
  var rows=[['IRS Schedule C — '+BIZ[b]],['Line item','Amount']], total=0;
  Object.keys(map).sort(function(a,b){return map[b]-map[a];}).forEach(function(k){total+=map[k];rows.push([k,map[k].toFixed(2)]);});
  rows.push(['Total deductible',total.toFixed(2)]);
  dl(rows,BIZ[b]+'_schedule_c.csv');
}

function dl(rows,name) {
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('↗ Downloaded');
}

// ── INIT ──
loadAll().then(function() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  render();
}).catch(function() {
  document.getElementById('loading').querySelector('.load-sub').textContent = 'Could not connect. Check your internet.';
});
</script>
