// ── SUPABASE ──
function sbH() { return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'}; }
function sbGet(t,p){
  var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
  var opts = {method:'GET', headers:sbH()};
  if(controller) opts.signal = controller.signal;
  var timer = controller ? setTimeout(function(){ controller.abort(); }, 10000) : null;
  return fetch(SB_URL+'/rest/v1/'+t+'?'+(p||''), opts)
    .then(function(r){ if(timer) clearTimeout(timer); return r.json(); })
    .catch(function(e){ if(timer) clearTimeout(timer); return []; });
}
function sbInsert(t,d){ return fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:sbH(),body:JSON.stringify(d)}); }
function sbUpdate(t,id,d){ return fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+encodeURIComponent(id),{method:'PATCH',headers:sbH(),body:JSON.stringify(d)}); }
function sbDelete(t,id){ return fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+encodeURIComponent(id),{method:'DELETE',headers:sbH()}); }
function sbUpsert(t,d){ return fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:Object.assign({},sbH(),{'Prefer':'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify(d)}); }

// Upload file to Supabase Storage, returns public URL
function sbUploadFile(file, path) {
  var uploadHeaders = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': file.type || 'application/octet-stream',
    'x-upsert': 'true'
  };
  return fetch(SB_URL + '/storage/v1/object/receipts/' + path, {
    method: 'POST',
    headers: uploadHeaders,
    body: file
  }).then(function(r) {
    if (!r.ok) throw new Error('Upload failed: ' + r.status);
    return SB_URL + '/storage/v1/object/public/receipts/' + path;
  });
}

// Upload multiple files, returns array of {name, url}
function uploadFiles(files, expenseId) {
  var uploads = Array.prototype.map.call(files, function(file) {
    var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    var path = expenseId + '/' + safeName;
    return sbUploadFile(file, path).then(function(url) {
      return { name: file.name, url: url };
    });
  });
  return Promise.all(uploads);
}
function setSyncDot(s){ var d=document.getElementById('sync-dot'); if(d) d.className='sync-dot '+s; }

function loadAll() {
  setSyncDot('syncing');
  var safe = function(p){ return p.catch(function(){ return []; }); };
  return Promise.all([
    safe(sbGet('expenses','order=date.desc')),
    safe(sbGet('events','order=date.desc')),
    safe(sbGet('ticket_prices','')),
    safe(sbGet('docs','order=uploaded.desc')),
    safe(sbGet('income_records','')),
    safe(sbGet('repeat_expenses','order=next_date.asc')),
    safe(sbGet('ownit_sales','order=date.desc'))
  ]).then(function(r) {
    var expenses=r[0]||[], events=r[1]||[], prices=r[2]||[], docs=r[3]||[], incomes=r[4]||[], repeats=r[5]||[], sales=r[6]||[];
    var keys=['rover','wyzant','itt','eve','ownit'];
    keys.forEach(function(k){ state[k].expenses=[]; if(state[k].events) state[k].events=[]; if(state[k].sales) state[k].sales=[]; });
    state.docs=[]; state.repeats=[];
    expenses.forEach(function(e){ if(state[e.biz]) state[e.biz].expenses.push({id:e.id,date:e.date,time:e.time,vendor:e.vendor,amount:e.amount,category:e.category,payMethod:e.pay_method,note:e.note,files:e.files?parseFiles(e.files):[]}); });
    events.forEach(function(e){ if(state[e.biz]) state[e.biz].events.push({id:e.id,name:e.name,date:e.date,ticketType:e.ticket_type,ticketQty:e.ticket_qty,revenue:e.revenue}); });
    prices.forEach(function(p){ if(state[p.biz]) state[p.biz].ticketPrices={single:p.single_price,couple:p.couple_price}; });
    docs.forEach(function(d){ state.docs.push({id:d.id,name:d.name,biz:d.biz,uploaded:d.uploaded,year:d.year||''}); });
    incomes.forEach(function(r){ if(state[r.biz]) state[r.biz].income={amount:r.amount||0,date:r.date||'',asOf:r.as_of||''}; });
    repeats.forEach(function(r){ state.repeats.push({id:r.id,biz:r.biz,vendor:r.vendor,amount:r.amount,category:r.category,payMethod:r.pay_method,note:r.note,freq:r.freq,nextDate:r.next_date}); });
    sales.forEach(function(s){ if(state.ownit) state.ownit.sales.push({id:s.id,date:s.date,clientName:s.client_name,appName:s.app_name,quote:s.quote,saleType:s.sale_type}); });
    setSyncDot('synced'); return true;
  }).catch(function(err){ setSyncDot('error'); console.error(err); return false; });
}

// ── HELPERS ──
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1'; setTimeout(function(){t.style.opacity='0';},2200); }
function fmt(n){ return '$'+parseFloat(n||0).toFixed(2); }
function fmtDate(d){ if(!d) return ''; var p=d.split('-'); return p[1]+'/'+p[2]+'/'+p[0].slice(2); }
function catCls(c){ return CAT_CLS[c]||'b-other'; }
function genId(){ return Date.now()+'-'+Math.random().toString(36).slice(2,7); }

// Parse files field — supports new JSON format [{name,url}] and old pipe-separated names
function parseFiles(raw) {
  if(!raw) return [];
  try {
    var parsed = JSON.parse(raw);
    if(Array.isArray(parsed)) return parsed; // new format
  } catch(e) {}
  // Old format: pipe-separated filenames
  return raw.split('|').filter(Boolean).map(function(n){ return {name:n, url:null}; });
}
function fmtMonthLabel(ym){ var p=ym.split('-'); return MONTHS[parseInt(p[1])-1]+' '+p[0]; }
function isUnassigned(v){ return !v||v===''||v==='— Select —'; }

function filteredExps(b){ var all=state[b].expenses||[]; if(periodMode==='all') return all; return all.filter(function(e){ if(!e.date) return false; if(periodMode==='year') return e.date.slice(0,4)===periodYear; if(periodMode==='month') return e.date.slice(0,7)===periodMonth; return true; }); }
function totalExp(b){ return filteredExps(b).reduce(function(s,e){
  var mult = SC_MULT[e.category] !== undefined ? SC_MULT[e.category] : 1;
  return s+(parseFloat(e.amount)||0)*mult;
},0); }
function filteredEvs(b){ var evs=state[b].events||[]; if(periodMode==='all') return evs; return evs.filter(function(ev){ if(!ev.date) return false; if(periodMode==='year') return ev.date.slice(0,4)===periodYear; if(periodMode==='month') return ev.date.slice(0,7)===periodMonth; return true; }); }
function totalRev(b){ return filteredEvs(b).reduce(function(s,ev){return s+(parseFloat(ev.revenue)||0);},0); }
function totalAtt(b){ return filteredEvs(b).reduce(function(s,ev){return s+(parseInt(ev.ticketQty)||0);},0); }
function getAvailableYears(b){ var y={}; (state[b].expenses||[]).forEach(function(e){if(e.date)y[e.date.slice(0,4)]=1;}); return Object.keys(y).sort().reverse(); }
function getAvailableMonths(b){ var m={}; (state[b].expenses||[]).forEach(function(e){if(e.date)m[e.date.slice(0,7)]=1;}); return Object.keys(m).sort().reverse(); }

function switchBiz(b2){ biz=b2; periodMode='all'; periodMonth=''; periodYear=''; var tabs=document.querySelectorAll('.biz-tab'); var keys=['rover','wyzant','itt','eve','ownit']; for(var i=0;i<tabs.length;i++) tabs[i].classList.toggle('active',keys[i]===b2); render(); }
function switchView(v){
  curView=v;
  ['earnings','add','overview','docs','export'].forEach(function(x){ var el=document.getElementById('nav-'+x); if(el) el.classList.toggle('active',x===v); });
  if(v==='overview'||v==='earnings'){
    setSyncDot('syncing');
    var t=setTimeout(function(){try{render();}catch(e){console.error(e);}},6000);
    loadAll().then(function(){clearTimeout(t);try{render();}catch(e){console.error(e);}}).catch(function(){clearTimeout(t);try{render();}catch(e){console.error(e);}});
  } else { try{render();}catch(e){console.error(e);} }
}
function setPeriod(m){ periodMode=m; periodMonth=''; periodYear=''; render(); }
function setPeriodYear(v){ if(!v){periodMode='all';periodYear='';render();return;} periodMode='year';periodYear=v;periodMonth='';render(); }
function setPeriodMonth(v){ if(!v){periodMode='all';periodMonth='';render();return;} periodMode='month';periodMonth=v;periodYear='';render(); }

function render(){
  var el=document.getElementById('content'); if(!el) return;
  try {
    if(curView==='overview') el.innerHTML=buildOverview();
    else if(curView==='add') el.innerHTML=buildAdd();
    else if(curView==='docs') el.innerHTML=buildDocs();
    else if(curView==='earnings') el.innerHTML=buildEarnings();
    else el.innerHTML=buildExport();
    if(curView==='add') initAddDefaults();
    if(curView==='export') renderSchedC();
    el.scrollTop=0;
  } catch(e) {
    console.error('Render error in '+curView+':', e);
    el.innerHTML='<div style="padding:24px;text-align:center;color:#3d4f2e"><p style="font-size:15px;font-weight:600;margin-bottom:8px">Error loading this view</p><p style="font-size:12px;color:#8EA86F;margin-bottom:16px">'+e.message+'</p><button onclick="location.reload()" style="padding:10px 20px;background:#8EA86F;color:#DCF2C2;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Tap to retry</button></div>';
  }
}

// ── PERIOD BAR ──
function buildPeriodBar(){
  var years=getAvailableYears(biz), months=getAvailableMonths(biz);
  var h='<div class="period-bar"><button class="period-pill'+(periodMode==='all'?' active':'')+'" onclick="setPeriod(\'all\')">All time</button>';
  if(years.length){ h+='<select class="period-select" onchange="setPeriodYear(this.value)" style="max-width:90px"><option value="">Year...</option>'; years.forEach(function(y){h+='<option value="'+y+'"'+(periodMode==='year'&&periodYear===y?' selected':'')+'>'+y+'</option>'}); h+='</select>'; }
  if(months.length){ h+='<select class="period-select" onchange="setPeriodMonth(this.value)" style="max-width:110px"><option value="">Month...</option>'; months.forEach(function(m){h+='<option value="'+m+'"'+(periodMode==='month'&&periodMonth===m?' selected':'')+'>'+fmtMonthLabel(m)+'</option>'}); h+='</select>'; }
  h+='</div>';
  if(periodMode!=='all'){ var label=periodMode==='year'?periodYear:fmtMonthLabel(periodMonth); h+='<div style="font-size:12px;color:var(--accent);font-weight:600;margin-bottom:10px">Showing: '+label+'</div>'; }
  return h;
}

// ── OVERVIEW ──
function buildOverview(){
  var exps=filteredExps(biz);
  var isT=TICKET_BIZ.indexOf(biz)>=0, isOwnit=biz==='ownit';
  var te=totalExp(biz), tr=isT?totalRev(biz):0, profit=tr-te;
  var cats=CATS[biz], ct={}; cats.forEach(function(c){ct[c]=0;});
  exps.forEach(function(e){ ct[e.category]!==undefined?ct[e.category]+=parseFloat(e.amount)||0:ct['Other']=(ct['Other']||0)+(parseFloat(e.amount)||0); });
  var flagged=exps.filter(function(e){return isUnassigned(e.category)||isUnassigned(e.payMethod);});

  var h=buildPeriodBar();
  // Flag banner
  if(flagged.length) h+='<div class="flag-banner">⚠️ '+flagged.length+' expense'+(flagged.length>1?'s':'')+' missing category or payment method — tap Edit to assign</div>';
  // Due repeats banner
  var today0=new Date().toISOString().split('T')[0];
  var dueRepeats=state.repeats.filter(function(r){return r.biz===biz&&r.nextDate<=today0;});
  if(dueRepeats.length){
    h+='<div class="flag-banner" style="background:#e6f1fb;border-color:var(--blue);color:var(--blue)">🔁 '+dueRepeats.length+' repeat expense'+(dueRepeats.length>1?'s':'')+' due — scroll down to log</div>';
  }

  h+='<div class="metrics">';
  h+='<div class="metric"><div class="metric-lbl">Expenses</div><div class="metric-val red">'+fmt(te)+'</div></div>';
  if(isT){
    h+='<div class="metric"><div class="metric-lbl">Revenue</div><div class="metric-val" style="color:var(--income)">'+fmt(tr)+'</div></div>';
    h+='<div class="metric"><div class="metric-lbl">Net profit</div><div class="metric-val '+(profit>=0?'green':'red')+'">'+fmt(profit)+'</div></div>';
    h+='<div class="metric"><div class="metric-lbl">Attendance</div><div class="metric-val">'+totalAtt(biz)+'</div></div>';
  } else if(isOwnit){
    var ownRev=(state.ownit.sales||[]).reduce(function(s,sa){return s+(parseFloat(sa.quote)||0);},0);
    var ownProfit=ownRev-te;
    h+='<div class="metric"><div class="metric-lbl">Sales revenue</div><div class="metric-val" style="color:var(--income)">'+fmt(ownRev)+'</div></div>';
    h+='<div class="metric" style="grid-column:1/-1"><div class="metric-lbl">Net profit</div><div class="metric-val '+(ownProfit>=0?'green':'red')+'">'+fmt(ownProfit)+'</div></div>';
  } else {
    var inc=state[biz].income||{amount:0,asOf:''};
    var incProfit=(parseFloat(inc.amount)||0)-te;
    h+='<div class="metric"><div class="metric-lbl">Logged</div><div class="metric-val">'+exps.length+'</div></div>';
    h+='<div class="metric" style="grid-column:1/-1"><div class="metric-lbl">Income YTD</div><div class="metric-val" style="color:var(--income)">'+fmt(inc.amount)+'</div>'+(inc.asOf?'<div style="font-size:10px;color:var(--text3);margin-top:3px">As of '+fmtDate(inc.asOf)+'</div>':'')+'</div>';
    h+='<div class="metric" style="grid-column:1/-1"><div class="metric-lbl">Net profit YTD</div><div class="metric-val '+(incProfit>=0?'green':'red')+'">'+fmt(incProfit)+'</div></div>';
    // Income update inline
    h+='</div><div class="sec-label">Update income</div><div class="card"><div class="card-body" style="padding-top:12px"><div class="form-row"><div class="fg" style="flex:2"><label>Income YTD ($)</label><input type="number" id="inc-amount" value="'+(inc.amount||'')+'" placeholder="0.00" step="0.01" inputmode="decimal"></div><div class="fg"><label>As of date</label><input type="date" id="inc-date" value="'+(inc.asOf||'')+'"></div></div><button class="btn-full" onclick="saveIncome()">Update Income</button></div></div>';
    h+='<div class="metrics">';
  }
  h+='</div>';

  // Category breakdown
  var hasCats=cats.some(function(c){return ct[c]>0;});
  if(hasCats){ h+='<div class="sec-label">By category</div><div class="card">'; cats.filter(function(c){return ct[c]>0;}).sort(function(a,b){return ct[b]-ct[a];}).forEach(function(c){ h+='<div class="cat-row"><span class="badge '+catCls(c)+'">'+c+'</span><span class="cat-amt">'+fmt(ct[c])+'</span></div>'; }); h+='</div>'; }

  // Events (ticket businesses)
  if(isT){
    var evs=filteredEvs(biz).slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
    h+='<div class="sec-label">Events</div><div class="card">';
    if(!evs.length) h+='<div class="empty">No events for this period.</div>';
    else {
      evs.forEach(function(ev){
        var rev=parseFloat(ev.revenue)||0;
        h+='<div class="ev-item"><div style="display:flex;justify-content:space-between;align-items:flex-start">';
        h+='<div><div class="ev-name">'+(ev.name||'Unnamed')+'</div><div class="ev-date">'+fmtDate(ev.date)+'</div></div>';
        h+='<span style="font-size:16px;font-weight:700;color:var(--income)">'+fmt(rev)+'</span></div>';
        h+='<div class="ev-stats"><div class="ev-stat">🎟 <strong>'+(ev.ticketQty||0)+'</strong> tickets</div><div class="ev-stat">Type: <strong>'+(ev.ticketType||'—')+'</strong></div></div>';
        h+='<div style="margin-top:8px"><button class="btn-del" onclick="deleteEvent(\''+ev.id+'\')">Delete</button></div></div>';
      });
      h+='<div class="total-row"><span>Period revenue</span><span style="color:var(--income)">'+fmt(totalRev(biz))+'</span></div>';
    }
    h+='</div>';
  }

  // OwnIt sales log
  if(isOwnit){
    var sales=(state.ownit.sales||[]).slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
    h+='<div class="sec-label">App sales</div><div class="card">';
    if(!sales.length) h+='<div class="empty">No sales logged yet.</div>';
    else {
      sales.forEach(function(s){
        h+='<div class="sale-item"><div style="display:flex;justify-content:space-between;align-items:flex-start">';
        h+='<div><div style="font-size:14px;font-weight:600">'+(s.clientName||'—')+'</div>';
        h+='<div style="font-size:12px;color:var(--text3)">'+(s.appName||'')+(s.appName&&s.date?' · ':'')+fmtDate(s.date)+'</div>';
        h+='<span class="badge b-software" style="margin-top:4px">'+(s.saleType||'')+'</span></div>';
        h+='<div style="text-align:right"><div style="font-size:16px;font-weight:700;color:var(--income)">'+fmt(s.quote)+'</div>';
        h+='<button class="btn-del" style="margin-top:4px" onclick="deleteSale(\''+s.id+'\')">Del</button></div></div></div>';
      });
    }
    h+='</div>';
  }

  // Due repeats for this business
  var today1=new Date().toISOString().split('T')[0];
  var bizDueRepeats=state.repeats.filter(function(r){return r.biz===biz&&r.nextDate<=today1;});
  if(bizDueRepeats.length){
    h+='<div class="sec-label">🔁 Repeat expenses due</div><div class="card">';
    bizDueRepeats.forEach(function(r){
      var isOverdue=r.nextDate<today1;
      h+='<div class="repeat-row '+(isOverdue?'overdue':'due-today')+'"><div style="flex:1;min-width:0">';
      h+='<div style="font-size:14px;font-weight:600">'+r.vendor+'</div>';
      h+='<div style="font-size:12px;color:var(--text3)">'+fmt(r.amount)+' · '+(r.freq==='monthly'?'Monthly':'Annual')+(r.payMethod?' · '+r.payMethod:'')+'</div>';
      h+='<div style="font-size:12px;color:'+(isOverdue?'var(--red)':'var(--orange)')+'">Due: '+fmtDate(r.nextDate)+(isOverdue?' ⚠️ overdue':' — today')+'</div>';
      h+='</div><button class="btn-edit" style="flex-shrink:0;margin-left:8px" onclick="logRepeat(\''+r.id+'\')">Log it</button></div>';
    });
    h+='</div>';
  }

  // Expense log
  var sorted=exps.slice().sort(function(a,b){return new Date(b.date+' '+(b.time||'00:00'))-new Date(a.date+' '+(a.time||'00:00'));});
  h+='<div class="sec-label">Expense log ('+sorted.length+')</div><div class="card">';
  if(!sorted.length) h+='<div class="empty">No expenses for this period.</div>';
  else sorted.forEach(function(e){
    var isFlagged=isUnassigned(e.category)||isUnassigned(e.payMethod);
    h+='<div class="exp-row'+(isFlagged?' flagged':'')+'"><div class="exp-main"><div class="exp-vendor">'+(e.vendor||'—')+'</div>';
    h+='<div class="exp-meta">'+fmtDate(e.date)+(e.time?' · '+e.time:'')+(e.payMethod&&!isUnassigned(e.payMethod)?' · '+e.payMethod:'<span style="color:var(--orange)"> · ⚠️ No payment</span>')+'</div>';
    if(e.note) h+='<div class="exp-note">'+e.note+'</div>';
    if(e.files&&e.files.length) h+='<div style="margin-top:4px">'+e.files.map(function(f){
  var name=typeof f==='object'?f.name:f;
  var url=(typeof f==='object'&&f.url)?f.url:'';
  return'<span class="file-chip viewable-file" data-name="'+name.replace(/"/g,'&quot;')+'" data-url="'+url.replace(/"/g,'&quot;')+'" style="cursor:pointer">👁 '+name+'</span>';
}).join('')+'</div>';
    h+='<span class="badge '+(isUnassigned(e.category)?'b-unassigned':catCls(e.category))+'">'+(isUnassigned(e.category)?'⚠️ Unassigned':e.category)+'</span></div>';
    h+='<div class="exp-right"><div class="exp-amt">'+fmt(e.amount)+'</div><div class="exp-actions"><button class="btn-edit" onclick="openEdit(\''+e.id+'\')">Edit</button><button class="btn-dupe" onclick="dupeExp(\''+e.id+'\')">Dupe</button><button class="btn-del" onclick="deleteExp(\''+e.id+'\')">Del</button></div></div></div>';
  });
  h+='</div>';
  return h;
}

function addExp(){
  var vendor=(document.getElementById('a-vendor').value||'').trim();
  var amount=parseFloat(document.getElementById('a-amount').value);
  var date=document.getElementById('a-date').value;
  var time=document.getElementById('a-time').value;
  var cat=document.getElementById('a-cat').value;
  var pay=document.getElementById('a-pay').value;
  var note=(document.getElementById('a-note').value||'').trim();
  if(!vendor||isNaN(amount)||amount<=0){toast('Enter vendor and amount');return;}
  if(!date){toast('Select a date');return;}
  var isRepeat=(document.getElementById('a-repeat')||{}).checked;
  var freq=(document.getElementById('a-freq')||{}).value||'monthly';
  var newId = genId();
  setSyncDot('syncing');

  // Upload files first if any, then save expense
  var fileUploadPromise;
  try {
    fileUploadPromise = (pendingFileObjects && pendingFileObjects.length > 0)
      ? uploadFiles(pendingFileObjects, newId)
      : Promise.resolve([]);
  } catch(e) {
    fileUploadPromise = Promise.resolve([]);
  }

  fileUploadPromise.then(function(uploadedFiles) {
    var filesJson = JSON.stringify(uploadedFiles || []);
    var row={id:newId,biz:biz,date:date,time:time,vendor:vendor,amount:amount,category:cat||'',pay_method:pay||'',note:note,files:filesJson};
    var ops=[sbInsert('expenses',row)];
    if(isRepeat){
      var nextDate=calcNextDate(date,freq);
      ops.push(sbInsert('repeat_expenses',{id:genId(),biz:biz,vendor:vendor,amount:amount,category:cat||'',pay_method:pay||'',note:note,freq:freq,next_date:nextDate}));
    }
    return Promise.all(ops);
  }).then(function(){return loadAll();}).then(function(){
    toast(isRepeat?'✓ Expense added & repeat scheduled':'✓ Expense added');
    pendingFiles=[]; pendingFileObjects=[];
    document.getElementById('a-vendor').value=''; document.getElementById('a-amount').value=''; document.getElementById('a-note').value='';
    var chips=document.getElementById('file-chips'); if(chips) chips.innerHTML='';
    var catSel=document.getElementById('a-cat'); if(catSel){catSel.value='';catSel.classList.add('unassigned');}
    var paySel=document.getElementById('a-pay'); if(paySel){paySel.value='';paySel.classList.add('unassigned');}
    var cb=document.getElementById('a-repeat'); if(cb){cb.checked=false;toggleRepeatOpts();}
  }).catch(function(e){setSyncDot('error');console.error('addExp error:',e);toast('Error: '+(e.message||'unknown'));});
}

function toggleRepeatOpts(){
  var cb=document.getElementById('a-repeat');
  var opts=document.getElementById('repeat-opts');
  if(opts) opts.style.display=(cb&&cb.checked)?'block':'none';
}

function calcNextDate(dateStr,freq){
  var p=dateStr.split('-');
  var d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  if(freq==='monthly') d.setMonth(d.getMonth()+1);
  else d.setFullYear(d.getFullYear()+1);
  return d.toISOString().split('T')[0];
}

function logRepeat(id){
  var r=null; for(var i=0;i<state.repeats.length;i++){if(state.repeats[i].id===id){r=state.repeats[i];break;}} if(!r) return;
  var today=new Date().toISOString().split('T')[0];
  // Calculate next date
  var parts=r.nextDate.split('-'); var d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var next;
  if(r.freq==='monthly'){ d.setMonth(d.getMonth()+1); next=d.toISOString().split('T')[0]; }
  else { d.setFullYear(d.getFullYear()+1); next=d.toISOString().split('T')[0]; }
  setSyncDot('syncing');
  var expRow={id:genId(),biz:r.biz,date:today,time:'',vendor:r.vendor,amount:r.amount,category:r.category,pay_method:r.payMethod,note:r.note||'',files:''};
  Promise.all([sbInsert('expenses',expRow), sbUpdate('repeat_expenses',id,{next_date:next})]).then(function(){return loadAll();}).then(function(){
    toast('✓ Logged & next date updated to '+fmtDate(next)); render();
  }).catch(function(){setSyncDot('error');toast('Failed');});
}

function viewFile(nameOrEncoded, urlParam){
  var filename, fileUrl;
  if(urlParam !== undefined){
    filename = nameOrEncoded || '';
    fileUrl = urlParam || null;
  } else {
    try {
      var fi = JSON.parse(decodeURIComponent(nameOrEncoded));
      filename = fi.name || ''; fileUrl = fi.url || null;
    } catch(e){ filename = nameOrEncoded || ''; fileUrl = null; }
  }
  if(!filename){ return; }
  var displayName = filename.split('/').pop();
  var ext = displayName.toLowerCase().split('.').pop().trim();
  var isImage = ['jpg','jpeg','png','gif','webp','heic','heif','bmp'].indexOf(ext) >= 0;
  var isPdf = ext === 'pdf';
  var h = '<div class="modal-overlay" onclick="closeModalDirect()"><div class="modal" onclick="event.stopPropagation()">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h += '<span class="modal-title" style="font-size:14px;word-break:break-all;max-width:85%">'+displayName+'</span>';
  h += '<span onclick="closeModalDirect()" style="font-size:24px;cursor:pointer;color:var(--text3);flex-shrink:0">✕</span></div>';
  if(fileUrl){
    if(isPdf){
      h += '<div style="text-align:center;padding:20px 0"><div style="font-size:48px;margin-bottom:12px">📄</div>';
      h += '<p style="font-size:13px;color:var(--text2);margin-bottom:16px">Tap to open your receipt PDF.</p>';
      h += '<button class="btn-full" onclick="openReceipt()">Open PDF</button></div>';
    } else if(isImage){
      h += '<img src="'+fileUrl+'" style="width:100%;border-radius:10px;max-height:62vh;object-fit:contain;background:var(--bg2)" onerror="this.style.display=\'none\';document.getElementById(\'img-err\').style.display=\'block\'" >';
      h += '<div id="img-err" style="display:none;text-align:center;padding:16px;font-size:13px;color:var(--red)">Could not load — <a href="'+fileUrl+'" target="_blank" style="color:var(--income)">open directly</a></div>';
      h += '<button class="btn-full" style="margin-top:10px" onclick="openReceipt()">↗ Open full size</button>';
    } else {
      h += '<div style="text-align:center;padding:20px 0"><div style="font-size:48px;margin-bottom:12px">📎</div>';
      h += '<button class="btn-full" onclick="openReceipt()">Open file</button></div>';
    }
  } else {
    h += '<div style="text-align:center;padding:24px 0"><div style="font-size:40px;margin-bottom:12px">📎</div>';
    h += '<p style="font-size:13px;color:var(--text2);margin-bottom:8px">This receipt was saved before cloud storage was enabled.</p>';
    h += '<p style="font-size:12px;color:var(--text3)">Tap Edit on this expense and re-attach the file to upload it.</p></div>';
  }
  h += '<button class="btn-full" style="background:var(--bg2);color:var(--text2);margin-top:8px" onclick="closeModalDirect()">Close</button>';
  h += '</div></div>';
  window._receiptUrl = fileUrl || null;
  document.getElementById('modal-root').innerHTML = h;
}

},0);
    var inc;
    if(k==='ownit') inc=(state.ownit.sales||[]).reduce(function(s,sa){return s+(parseFloat(sa.quote)||0);},0);
    else if(TICKET_BIZ.indexOf(k)>=0){
      var p=state[k].ticketPrices||{single:65,couple:115};
      inc=(state[k].events||[]).reduce(function(s,ev){return s+(parseFloat(ev.revenue)||0);},0);
    } else inc=parseFloat((state[k].income||{}).amount)||0;
    var profit=inc-exp;
    totalIncome+=inc; totalExpAll+=exp; totalProfitAll+=profit;
    var emoji={rover:'🐾',wyzant:'📚',itt:'💃',eve:'🌿',ownit:'💻'}[k];
    h+='<div class="card" style="margin-bottom:10px">';
    h+='<div style="padding:12px 14px 0;font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px">'+emoji+' '+BIZ[k]+'</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border-top:1px solid var(--border)">';
    h+='<div style="padding:12px 10px;border-right:1px solid var(--border)"><div class="metric-lbl">Income</div><div style="font-size:16px;font-weight:700;color:var(--income)">'+fmt(inc)+'</div>'+(k!=='ownit'&&TICKET_BIZ.indexOf(k)<0&&(state[k].income||{}).asOf?'<div style="font-size:10px;color:var(--text3);margin-top:2px">As of '+fmtDate(state[k].income.asOf)+'</div>':'')+'</div>';
    h+='<div style="padding:12px 10px;border-right:1px solid var(--border)"><div class="metric-lbl">Expenses</div><div style="font-size:16px;font-weight:700;color:var(--red)">'+fmt(exp)+'</div></div>';
    h+='<div style="padding:12px 10px"><div class="metric-lbl">Net profit</div><div style="font-size:16px;font-weight:700;color:'+(profit>=0?'var(--profit)':'var(--red)')+'">'+fmt(profit)+'</div></div>';
    h+='</div></div>';
  });
  h+='<div class="sec-label">Combined total</div><div class="card" style="overflow:hidden">';
  h+='<div style="background:var(--income);padding:14px 16px"><div style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Total income — all businesses</div>';
  h+='<div style="font-size:32px;font-weight:700;color:#fff">'+fmt(totalIncome)+'</div></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr"><div style="padding:14px;border-right:1px solid var(--border)"><div class="metric-lbl">Total expenses</div><div style="font-size:22px;font-weight:700;color:var(--red)">'+fmt(totalExpAll)+'</div></div>';
  h+='<div style="padding:14px"><div class="metric-lbl">Total net profit</div><div style="font-size:22px;font-weight:700;color:'+(totalProfitAll>=0?'var(--profit)':'var(--red)')+'">'+fmt(totalProfitAll)+'</div></div></div>';
  h+='<div style="padding:12px 16px;background:var(--bg2);border-top:1px solid var(--border)"><p style="font-size:12px;color:var(--text2)">⚠️ Estimate only. Consult a tax professional for actual liability.</p></div></div>';
  return h;
}

// ── EDIT MODAL ──
function openEdit(id){
  var e=null, exps=state[biz].expenses||[];
  for(var i=0;i<exps.length;i++){if(exps[i].id===id){e=exps[i];break;}} if(!e) return;
  editingId=id; editPendingFiles=[]; editNewFileObjects=[];
  // Parse existing files - could be objects {name,url} or strings
  editExistingFiles=(e.files||[]).map(function(f){ return typeof f==='object'?f:{name:f,url:null}; });
  var cats=CATS[biz];
  var h='<div class="modal-overlay" onclick="closeModal(event)"><div class="modal">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span class="modal-title">Edit Expense</span><span onclick="closeModalDirect()" style="font-size:22px;cursor:pointer;color:var(--text3)">✕</span></div>';
  h+='<div class="form-row"><div class="fg"><label>Date</label><input type="date" id="ed-date" value="'+(e.date||'')+'"></div><div class="fg"><label>Time</label><input type="time" id="ed-time" value="'+(e.time||'')+'"></div></div>';
  h+='<div class="form-row"><div class="fg" style="flex:2"><label>Vendor</label><input type="text" id="ed-vendor" value="'+(e.vendor||'')+'" autocorrect="off"></div><div class="fg"><label>Amount ($)</label><input type="number" id="ed-amount" value="'+(e.amount||'')+'" step="0.01" inputmode="decimal"></div></div>';
  h+='<div class="form-row"><div class="fg"><label>Category</label><select id="ed-cat"><option value="">— Select —</option>'+cats.map(function(c){return'<option'+(c===e.category?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div><div class="fg"><label>Payment</label><select id="ed-pay"><option value="">— Select —</option>'+PAY.slice(1).map(function(p){return'<option'+(p===e.payMethod?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div></div>';
  h+='<div class="fg" style="margin-bottom:12px"><label>Note</label><input type="text" id="ed-note" value="'+(e.note||'')+'" autocorrect="off"></div>';
  h+='<div class="fg" style="margin-bottom:16px"><label>Receipts & files</label>';
  h+='<div id="ed-existing-chips" style="margin-bottom:6px">'+renderExistingChips()+'</div>';
  h+='<div class="upload-zone" onclick="document.getElementById(\'ed-file\').click()">📎 Add new receipt or file<input type="file" id="ed-file" style="display:none" accept="image/*,.pdf" multiple onchange="handleEditFiles(this)"></div>';
  h+='<div id="ed-new-chips"></div></div>';
  h+='<button class="btn-full" onclick="saveEdit()">Save Changes</button>';
  h+='<button class="btn-full" style="background:var(--bg2);color:var(--text2);margin-top:8px" onclick="closeModalDirect()">Cancel</button>';
  h+='</div></div>';
  document.getElementById('modal-root').innerHTML=h;
}
function renderExistingChips(){
  return editExistingFiles.map(function(f,i){
    var n=typeof f==='object'?f.name:String(f);
    return '<span class="file-chip">📎 '+n+' <button onclick="rmExisting('+i+')" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:15px;font-weight:700;padding:0 3px">×</button></span>';
  }).join('');
}
function rmExisting(idx){
  editExistingFiles.splice(idx,1);
  var c=document.getElementById('ed-existing-chips');
  if(c) c.innerHTML=renderExistingChips();
}
function handleEditFiles(input){
  Array.prototype.forEach.call(input.files,function(f){
    if(!editPendingFiles.some(function(n){return n===f.name;})){
      editPendingFiles.push(f.name); editNewFileObjects.push(f);
    }
  });
  renderNewChips();
}
function renderNewChips(){
  var c=document.getElementById('ed-new-chips');
  if(c) c.innerHTML=editPendingFiles.map(function(f,i){
    return '<span class="file-chip" style="background:var(--accent-light)">📎 '+f+' <button onclick="rmNew('+i+')" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:15px;font-weight:700;padding:0 3px">×</button></span>';
  }).join('');
}
function rmNew(idx){
  editPendingFiles.splice(idx,1); editNewFileObjects.splice(idx,1);
  renderNewChips();
}
function openReceipt(){ if(window._receiptUrl) window.open(window._receiptUrl,'_blank'); }
function closeModal(evt){ if(evt.target.classList.contains('modal-overlay')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('modal-root').innerHTML=''; editingId=null; editPendingFiles=[]; editExistingFiles=[]; editNewFileObjects=[]; }
function saveEdit(){
  var date=document.getElementById('ed-date').value;
  var time=document.getElementById('ed-time').value;
  var vendor=(document.getElementById('ed-vendor').value||'').trim();
  var amount=parseFloat(document.getElementById('ed-amount').value)||0;
  var category=document.getElementById('ed-cat').value;
  var payMethod=document.getElementById('ed-pay').value;
  var note=(document.getElementById('ed-note').value||'').trim();
  setSyncDot('syncing');

  // Upload any new files, then save
  var uploadPromise = editNewFileObjects && editNewFileObjects.length > 0
    ? uploadFiles(editNewFileObjects, editingId+'-edit'+Date.now())
    : Promise.resolve([]);

  uploadPromise.then(function(newUploaded){
    // Merge kept existing files + newly uploaded files
    var allFiles = editExistingFiles.concat(newUploaded);
    var data={date:date,time:time,vendor:vendor,amount:amount,category:category,pay_method:payMethod,note:note,files:JSON.stringify(allFiles)};
    return sbUpdate('expenses',editingId,data);
  }).then(function(){return loadAll();}).then(function(){
    closeModalDirect(); toast('✓ Updated'); render();
  }).catch(function(e){setSyncDot('error');toast('Save failed: '+e.message);});
}

// ── DUPLICATE ──
function dupeExp(id){
  var exps=state[biz].expenses, orig=null;
  for(var i=0;i<exps.length;i++){if(exps[i].id===id){orig=exps[i];break;}} if(!orig) return;
  var today=new Date().toISOString().split('T')[0];
  var row={id:genId(),biz:biz,date:today,time:orig.time,vendor:orig.vendor,amount:orig.amount,category:orig.category,pay_method:orig.payMethod,note:(orig.note?orig.note+' (copy)':'(copy)'),files:(orig.files||[]).join('|')};
  setSyncDot('syncing');
  sbInsert('expenses',row).then(function(){return loadAll();}).then(function(){toast('✓ Duplicated');render();}).catch(function(){setSyncDot('error');toast('Failed');});
}

// ── EXPORT ──
function buildExport(){
  var h='<div class="sec-label">Download CSV for Google Sheets</div><div class="card"><div class="card-body">';
  h+='<div class="export-grid">'+Object.keys(BIZ).map(function(k){return'<button class="btn-sm" onclick="exportCSV(\''+k+'\')">'+BIZ[k]+'</button>';}).join('')+'</div>';
  h+='<button class="btn-full" style="margin-top:10px" onclick="exportCSV(\'all\')">↗ Export All Businesses</button></div></div>';
  h+='<div class="sec-label">Schedule C (Tax)</div><div class="card"><div class="card-body">';
  h+='<select id="sc-biz" onchange="renderSchedC()" style="width:100%;padding:12px;border:1.5px solid var(--border2);border-radius:var(--r-sm);font-size:16px;background:#fff;-webkit-appearance:none;margin-bottom:12px">';
  h+=Object.keys(BIZ).map(function(k){return'<option value="'+k+'">'+BIZ[k]+'</option>';}).join('');
  h+='</select><div id="sc-out"></div><button class="btn-full" style="margin-top:10px" onclick="exportSchC()">↗ Download Schedule C CSV</button></div></div>';
  return h;
}

function renderSchedC(){
  var b=(document.getElementById('sc-biz')||{}).value||'rover';
  var exps=state[b].expenses||[], map={};
  exps.forEach(function(e){
    if(!e.category||e.category==='') return;
    var l=SC_MAP[e.category]||'Other expenses (ln 48)';
    var mult=SC_MULT[e.category]||1;
    map[l]=(map[l]||0)+(parseFloat(e.amount)||0)*mult;
  });
  var out=document.getElementById('sc-out'); if(!out) return;
  if(!Object.keys(map).length){out.innerHTML='<p style="font-size:13px;color:var(--text3);padding:8px 0">No expenses yet.</p>';return;}
  var total=0, h='<div class="card" style="margin:0">';
  Object.keys(map).sort(function(a,b){return map[b]-map[a];}).forEach(function(k){total+=map[k];h+='<div class="schc-row"><span style="color:var(--text2)">'+k+'</span><strong>'+fmt(map[k])+'</strong></div>';});
  h+='<div class="schc-row" style="background:var(--bg2)"><span>Total deductible</span><strong style="color:var(--red)">'+fmt(total)+'</strong></div>';
  h+='<div style="padding:10px 14px;font-size:11px;color:var(--text3)">* Business Meals at 50%, Phone Bill at 15%, iPad at 25% per IRS rules</div></div>';
  out.innerHTML=h;
}

function exportCSV(b){
  var rows=[['Business','Date','Time','Vendor','Amount','Category','Payment Method','Note','Receipts','Schedule C Line']];
  var keys=b==='all'?Object.keys(BIZ):[b];
  keys.forEach(function(k){
    (state[k].expenses||[]).forEach(function(e){
      var line=SC_MAP[e.category]||'';
      rows.push([BIZ[k],e.date,e.time,e.vendor,e.amount,e.category,e.payMethod,e.note,(e.files||[]).join('; '),line]);
    });
    if(k==='ownit'&&state.ownit.sales.length){ rows.push([]); rows.push(['OwnIt Sales','Date','Client','App','Quote','Type']); state.ownit.sales.forEach(function(s){rows.push(['OwnIt',s.date,s.clientName,s.appName,s.quote,s.saleType]);}); }
  });
  dl(rows,(b==='all'?'all_businesses':BIZ[b])+'_expenses.csv');
}
function exportSchC(){
  var b=(document.getElementById('sc-biz')||{}).value||'rover';
  var exps=state[b].expenses||[], map={}, total=0;
  exps.forEach(function(e){ if(!e.category) return; var l=SC_MAP[e.category]||'Other expenses (ln 48)'; var mult=SC_MULT[e.category]||1; map[l]=(map[l]||0)+(parseFloat(e.amount)||0)*mult; });
  var rows=[['IRS Schedule C — '+BIZ[b]],['Line item','Deductible amount']];
  Object.keys(map).sort(function(a,b){return map[b]-map[a];}).forEach(function(k){total+=map[k];rows.push([k,map[k].toFixed(2)]);});
  rows.push(['Total deductible',total.toFixed(2)]);
  dl(rows,BIZ[b]+'_schedule_c.csv');
}
function dl(rows,name){ var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n'); var a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download=name; document.body.appendChild(a); a.click(); document.body.removeChild(a); toast('↗ Downloaded'); }

// ── GLOBAL FILE CHIP HANDLER ──
document.addEventListener('click', function(evt) {
  var t = evt.target;
  // Walk up to find viewable-file chip
  while(t && t !== document.body) {
    if(t.classList && t.classList.contains('viewable-file')) {
      var name = t.getAttribute('data-name');
      var url = t.getAttribute('data-url') || '';
      viewFile(name, url);
      return;
    }
    t = t.parentNode;
  }
});

// ── AUTO-LOG REPEATS ──
function autoLogDueRepeats(){
  var today=new Date().toISOString().split('T')[0];
  var due=state.repeats.filter(function(r){return r.nextDate<=today;});
  if(!due.length) return Promise.resolve();
  var ops=[];
  due.forEach(function(r){
    // Log the expense on its due date
    var expRow={id:genId(),biz:r.biz,date:r.nextDate,time:'',vendor:r.vendor,amount:r.amount,category:r.category,pay_method:r.payMethod,note:(r.note||'')+(r.note?' (auto)':'auto'),files:''};
    var nextDate=calcNextDate(r.nextDate,r.freq);
    ops.push(sbInsert('expenses',expRow));
    ops.push(sbUpdate('repeat_expenses',r.id,{next_date:nextDate}));
  });
  return Promise.all(ops).then(function(){ return loadAll(); }).then(function(){
    if(due.length) toast('🔁 '+due.length+' repeat expense'+(due.length>1?'s':'')+' auto-logged');
  }).catch(function(e){ console.error('Auto-log failed',e); });
}

// ── INIT ──
function showApp() {
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  try { render(); } catch(e) {
    console.error('Render error:', e);
    // Show a basic error message inside the app instead of blank screen
    var el = document.getElementById('content');
    if(el) el.innerHTML = '<div style="padding:24px;text-align:center;color:#3d4f2e"><p style="font-size:16px;font-weight:600;margin-bottom:8px">Something went wrong loading your data.</p><p style="font-size:13px;color:#8EA86F;margin-bottom:16px">Error: '+e.message+'</p><button onclick="location.reload()" style="padding:12px 24px;background:#8EA86F;color:#DCF2C2;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer">Tap to retry</button></div>';
  }
}

var initTimeout = setTimeout(function() {
  console.warn('Load timeout — showing app with available data');
  showApp();
}, 8000);

loadAll().then(function(){
  clearTimeout(initTimeout);
  showApp();
  autoLogDueRepeats().catch(function(e){ console.error('Auto-log failed', e); });
}).catch(function(err){
  clearTimeout(initTimeout);
  console.error('Load error:', err);
  // Still show the app even on error so user isn't stuck
  showApp();
});
</script>
</body>
